version: '3.8'

services:
  nudgebot:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - nudgebot-data:/var/data
    environment:
      - NODE_ENV=production
      - DOCKER=true
      - DATA_DIR=/var/data
      - DATABASE_URL=postgres://user:password@postgres:5432/nudgebot
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - DEFAULT_MODEL=deepseek/deepseek-chat-v3-0324:free
      - APP_PASSWORD=${APP_PASSWORD}
      - APP_SECRET=${APP_SECRET}
      - NEXT_PUBLIC_APP_NAME=Nudgebot
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: nudgebot
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d nudgebot"]
      interval: 5s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - nudgebot

volumes:
  nudgebot-data:
  postgres-data:
