services:
  - type: web
    name: nudgebot
    env: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENROUTER_API_KEY
        description: Your OpenRouter API Key (sk-or-...)
      - key: APP_PASSWORD
        description: Password used for /login access
      - key: APP_SECRET
        description: Secret token stored in auth cookie
      - key: DEFAULT_MODEL
        value: "deepseek/deepseek-chat-v3-0324:free"
      - key: USE_SQLITE
        value: "true"
