services:
  - type: web
    name: nudgebot
    runtime: node
    plan: starter
    buildCommand: npm install && npm install -g cline && npm run build
    startCommand: npm start
    disk:
      name: nudgebot-data
      mountPath: /var/data
      sizeGB: 5
    envVars:
      - key: NODE_ENV
        value: production
      - key: RENDER
        value: "true"
      - key: DATA_DIR
        value: /var/data
      - key: DATABASE_URL
        fromDatabase:
          name: nudgebot-db
          property: connectionString
      - key: OPENROUTER_API_KEY
        sync: false
      - key: DEFAULT_MODEL
        value: deepseek/deepseek-chat-v3-0324:free
      - key: APP_PASSWORD
        sync: false
      - key: APP_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_APP_NAME
        value: Nudgebot
      - key: GITHUB_TOKEN
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REFRESH_TOKEN
        sync: false

databases:
  - name: nudgebot-db
    databaseName: nudgebot
    plan: free
